<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>真打ち登場 予約</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; margin: 0; padding: 16px; background: #faf7f2; color: #333; }
  h1 { font-size: 18px; margin: 0 0 16px; }
  .product { display: flex; gap: 12px; border: 1px solid #e2ddd3; border-radius: 10px; padding: 12px; margin-bottom: 10px; background: #fff; }
  .product.soldout { opacity: 0.45; }
  .product img { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; flex-shrink: 0; background: #eee; }
  .product .info { flex: 1; }
  .product .name { font-weight: 600; font-size: 14px; }
  .product .desc { font-size: 12px; color: #777; margin: 4px 0; }
  .product .price { font-size: 13px; color: #a35c2b; }
  .product .soldout-label { font-size: 12px; color: #c0392b; font-weight: 600; }
  .qty-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .qty-row button { width: 28px; height: 28px; border-radius: 6px; border: 1px solid #ccc; background: #fff; font-size: 16px; }
  .qty-row span { min-width: 20px; text-align: center; }
  label { display: block; font-size: 13px; margin: 14px 0 4px; font-weight: 600; }
  input, select { width: 100%; box-sizing: border-box; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
  .submit-btn { width: 100%; padding: 14px; margin-top: 20px; background: #a35c2b; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; }
  .submit-btn:disabled { background: #ccc; }
  .close-btn { width: 100%; padding: 12px; margin-top: 12px; background: #fff; color: #a35c2b; border: 1px solid #a35c2b; border-radius: 10px; font-size: 14px; font-weight: 600; }
  #message { margin-top: 12px; font-size: 13px; color: #c0392b; }
  #success { display:none; text-align:center; padding: 40px 0; }
  #cartSummary { font-size: 13px; color: #555; margin-top: 10px; }
</style>
</head>
<body>

<div id="app">
  <h1>真打ち登場 ご予約</h1>

  <label>来店日</label>
  <input type="date" id="visitDate">

  <label>来店時刻</label>
  <select id="visitTime">
    <option value="">選択してください</option>
    <option value="09:00">9:00</option>
    <option value="09:30">9:30</option>
    <option value="10:00">10:00</option>
    <option value="10:30">10:30</option>
    <option value="11:00">11:00</option>
    <option value="11:30">11:30</option>
    <option value="12:00">12:00</option>
    <option value="12:30">12:30</option>
    <option value="13:00">13:00</option>
    <option value="13:30">13:30</option>
    <option value="14:00">14:00</option>
    <option value="14:30">14:30</option>
    <option value="15:00">15:00</option>
    <option value="15:30">15:30</option>
    <option value="16:00">16:00</option>
    <option value="16:30">16:30</option>
    <option value="17:00">17:00</option>
    <option value="17:30">17:30</option>
    <option value="18:00">18:00</option>
    <option value="18:30">18:30</option>
    <option value="19:00">19:00</option>
  </select>

  <div id="productList"></div>
  <div id="cartSummary"></div>

  <label>お受け取りお名前(未入力の場合はLINEアカウント名)</label>
  <input type="text" id="pickupName" placeholder="例: 山田">

  <div id="message"></div>
  <button class="submit-btn" id="submitBtn" disabled>商品を選択してください</button>
</div>

<div id="success">
  <p>ご予約を受け付けました。</p>
  <p>店舗にて在庫確認後、確定のご連絡をLINEでお送りします。</p>
  <button class="close-btn" id="closeBtn">画面を閉じる</button>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
const LIFF_ID = '2010773108-TXLeBy5d';
const ENDPOINT = 'https://script.google.com/macros/s/AKfycbyALJ2NKdas8b7FNLCHehEY-QfUDNwETLEOZulHERRM9mHICvOxjlQ1YPynsjGhZnoxAw/exec';

let profile = null;
let productsCache = [];
let cart = {}; // { productId: qty }

function todayJst_() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

function init() {
  liff.init({ liffId: LIFF_ID })
    .then(() => {
      if (liff.isLoggedIn()) {
        return liff.getProfile().then((p) => {
          profile = p;
          document.getElementById('visitDate').value = todayJst_();
          document.getElementById('visitDate').addEventListener('change', loadProducts);
          loadProducts();
        });
      } else {
        document.getElementById('message').textContent = '下のボタンを押してLINEログインを行ってください';
        const btn = document.createElement('button');
        btn.className = 'submit-btn';
        btn.textContent = 'LINEでログインする';
        btn.onclick = () => liff.login();
        document.getElementById('app').appendChild(btn);
      }
    })
    .catch((err) => {
      document.getElementById('message').textContent = 'LINEログインでエラーが発生しました: ' + err;
    });
}

function loadProducts() {
  const date = document.getElementById('visitDate').value;
  if (!date) return;
  fetch(ENDPOINT + '?action=products&date=' + date)
    .then(res => res.json())
    .then(data => {
      productsCache = data.products || [];
      cart = {};
      renderProducts();
      updateCartUI();
    })
    .catch(err => {
      document.getElementById('message').textContent = '商品取得エラー: ' + err;
    });
}

function renderProducts() {
  const list = document.getElementById('productList');
  list.innerHTML = '';
  productsCache.forEach(p => {
    const div = document.createElement('div');
    div.className = 'product' + (p.soldOut ? ' soldout' : '');
    const imgTag = p.image
      ? '<img src="' + p.image + '" onerror="this.style.visibility=\'hidden\'">'
      : '<img style="visibility:hidden">';
    div.innerHTML =
      imgTag +
      '<div class="info">' +
        '<div class="name">' + p.name + '</div>' +
        '<div class="desc">' + (p.desc || '') + '</div>' +
        '<div class="price">¥' + p.price + '</div>' +
        (p.soldOut
          ? '<div class="soldout-label">この日は満数です</div>'
          : '<div class="qty-row">' +
              '<button type="button" onclick="changeQty(\'' + p.id + '\', -1)">-</button>' +
              '<span id="qty-' + p.id + '">' + (cart[p.id] || 0) + '</span>' +
              '<button type="button" onclick="changeQty(\'' + p.id + '\', 1)">+</button>' +
            '</div>') +
      '</div>';
    list.appendChild(div);
  });
}

function changeQty(productId, delta) {
  const current = cart[productId] || 0;
  const next = Math.max(0, current + delta);
  if (next === 0) {
    delete cart[productId];
  } else {
    cart[productId] = next;
  }
  document.getElementById('qty-' + productId).textContent = next;
  updateCartUI();
}

function updateCartUI() {
  const entries = Object.keys(cart).filter(id => cart[id] > 0);
  const btn = document.getElementById('submitBtn');
  const summary = document.getElementById('cartSummary');

  if (entries.length === 0) {
    btn.disabled = true;
    btn.textContent = '商品を選択してください';
    summary.textContent = '';
    return;
  }

  btn.disabled = false;
  btn.textContent = 'この内容で予約する';
  summary.textContent = entries.map(id => {
    const p = productsCache.find(pp => pp.id === id);
    return (p ? p.name : id) + ' × ' + cart[id];
  }).join(' / ');
}

document.getElementById('submitBtn').addEventListener('click', submitReservation);
document.getElementById('closeBtn').addEventListener('click', () => {
  if (liff.isInClient()) {
    liff.closeWindow();
  }
});

function submitReservation() {
  const visitDate = document.getElementById('visitDate').value;
  const visitTime = document.getElementById('visitTime').value;
  const pickupName = document.getElementById('pickupName').value;
  const messageEl = document.getElementById('message');
  messageEl.textContent = '';

  if (!visitDate || !visitTime) {
    messageEl.textContent = '来店日時を入力してください';
    return;
  }

  const items = Object.keys(cart)
    .filter(id => cart[id] > 0)
    .map(id => ({ productId: id, qty: cart[id] }));

  if (items.length === 0) {
    messageEl.textContent = '商品を選択してください';
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  const params = new URLSearchParams({
    action: 'create',
    userId: profile.userId,
    displayName: profile.displayName,
    pickupName: pickupName,
    visitDate: visitDate,
    visitTime: visitTime,
    items: JSON.stringify(items)
  });

  const start = Date.now();
  fetch(ENDPOINT + '?' + params.toString())
    .then(res => res.json())
    .then(data => {
      if (data.ok) {
        document.getElementById('app').style.display = 'none';
        document.getElementById('success').style.display = 'block';
        const successBox = document.getElementById('success');
        const idNote = document.createElement('p');
        idNote.style.fontSize = '13px';
        idNote.style.color = '#888';
        idNote.textContent = '予約ID: ' + data.id;
        successBox.insertBefore(idNote, successBox.querySelector('.close-btn'));
      } else {
        messageEl.textContent = (data.message || '予約に失敗しました') + '(' + (Date.now() - start) + 'ms)';
        btn.disabled = false;
        btn.textContent = 'この内容で予約する';
      }
    })
    .catch(err => {
      messageEl.textContent = '通信エラーが発生しました: ' + err + '(' + (Date.now() - start) + 'ms)';
      btn.disabled = false;
      btn.textContent = 'この内容で予約する';
    });
}

init();
</script>
</body>
</html>
